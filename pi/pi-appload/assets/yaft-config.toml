# yaft config for the pi terminal on the reMarkable 2 (AppLoad).
# Requires the patched yaft build shipped by pi-appload (see yaft-tablet.patch).

layout = "qwerty"
keymap = "rm-qwerty"

# Type Folio attached -> landscape + hidden on-screen keyboard.
auto-rotate = true
rotation = "none"

# Never full-refresh based on update count (each one is a flashing inversion;
# pi's TUI redraws constantly and made the panel strobe).
auto-refresh = 0

# App-triggered full refreshes (TUI clear-screens) at most every 120 s.
# Five-finger tap forces a refresh any time (AppLoad gesture).
full-refresh-interval = 120

repeat-delay = 600
repeat-rate = 25

# 2x of the embedded 12x24 Terminus: 24x48 px cells -> ~57 columns.
font-scale = 2

# Blank border around the terminal area, in pixels.
padding = 16
