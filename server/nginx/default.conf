server {
    listen 80 default_server;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        autoindex on;
        autoindex_exact_size off;
        autoindex_localtime on;
        try_files $uri $uri/ =404;
    }

    location = /raw { return 302 /raw/; }

    location /raw/pages/ {
        alias /srv/raw-pages/;
        autoindex on;
        autoindex_format json;
    }

    location /raw/ {
        alias /srv/raw-app/;
        index index.html;
    }
}
