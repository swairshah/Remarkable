<!doctype html>
<!-- papier web viewer — served at the root of remarkable.exe.xyz.
     Read-view of the tablet's ~/.local/share/papier/ mirror + a drop-zone
     to add documents. A fork of the notebook viewer, generalized for the
     papier document model (folders, notebooks + raster books). -->
<html lang="en">
<head>
<meta charset="utf-8">
<!-- Opt out of dark-mode browser extensions (Dark Reader): they invert the
     document page images/canvas unpredictably. This viewer already ships its
     own light/dark theme, so we render in true colours. -->
<meta name="darkreader-lock">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Papier</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --papier: #fbfbf9; --ink: #1c1c1c; --ai: #2457c5;
    --bg: #ececec; --card: #fff; --line: #d8d8d4; --muted: #6a6a66; --accent: #1c1c1c;
  }
  @media (prefers-color-scheme: dark) {
    :root { --papier:#f4f4f0; --bg:#161615; --card:#212120; --line:#333; --muted:#9a9a94; --accent:#f0f0ea; }
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    background: var(--bg); color: var(--accent);
    font: 15px/1.5 -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  header {
    position: sticky; top: 0; z-index: 5; display: flex; align-items: center; gap: 14px;
    padding: 14px 20px; background: var(--card); border-bottom: 1px solid var(--line);
  }
  header .brand { font-weight: 650; font-size: 18px; letter-spacing: .2px; }
  header .crumb { color: var(--muted); cursor: pointer; }
  header .crumb:hover { color: var(--accent); }
  header .spacer { flex: 1; }
  header .badge { font-size: 12px; color: var(--muted); }
  header .dot { display:inline-block; width:8px; height:8px; border-radius:50%; background:#3aa76d; margin-right:5px; vertical-align:middle; }
  main { max-width: 1200px; margin: 0 auto; padding: 22px 20px 60px; }

  /* home grid */
  .section-title { color: var(--muted); font-size: 13px; text-transform: uppercase; letter-spacing: .06em; margin: 22px 4px 10px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 18px; }
  .card { background: var(--card); border: 1px solid var(--line); border-radius: 10px; overflow: hidden; cursor: pointer; transition: transform .08s ease, box-shadow .08s ease; }
  .card:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,.10); }
  .thumb { aspect-ratio: 3/4; background: var(--papier); display: grid; place-items: center; border-bottom: 1px solid var(--line); overflow: hidden; }
  .thumb img, .thumb canvas { width: 100%; height: 100%; object-fit: contain; }
  .thumb.folder { background: linear-gradient(160deg, #d9d9d2, #c7c7bf); }
  .thumb.folder svg { width: 46%; opacity: .55; }
  .card .meta { padding: 10px 12px; }
  .card .meta .t { font-weight: 600; font-size: 14px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .card .meta .s { color: var(--muted); font-size: 12px; margin-top: 3px; }

  /* doc reader */
  .pages { display: flex; flex-direction: column; align-items: center; gap: 22px; }
  .page { position: relative; width: 100%; max-width: 900px; aspect-ratio: 1404 / 1872; background: var(--papier); box-shadow: 0 2px 14px rgba(0,0,0,.12); border-radius: 4px; overflow: hidden; }
  .page canvas, .page img { display: block; width: 100%; height: auto; }
  .page .plabel { position: absolute; top: 8px; right: 12px; font-size: 11px; color: var(--muted); background: rgba(255,255,255,.7); padding: 1px 7px; border-radius: 9px; }
  .empty { color: var(--muted); text-align: center; padding: 80px 20px; }
  .empty code { background: var(--card); border: 1px solid var(--line); border-radius: 6px; padding: 2px 7px; }

  /* drop-zone */
  #drop { position: fixed; inset: 0; z-index: 20; background: rgba(20,20,20,.72); color: #fff; display: none; place-items: center; text-align: center; }
  #drop.show { display: grid; }
  #drop .box { border: 3px dashed rgba(255,255,255,.7); border-radius: 16px; padding: 60px 80px; font-size: 22px; }
  .toast { position: fixed; left: 50%; bottom: 26px; transform: translateX(-50%); background: var(--accent); color: var(--card); padding: 10px 18px; border-radius: 8px; box-shadow: 0 4px 16px rgba(0,0,0,.25); z-index: 30; opacity: 0; transition: opacity .2s; pointer-events: none; }
  .toast.show { opacity: 1; }
  .addbtn { border: 1px solid var(--line); background: var(--card); color: var(--accent); border-radius: 8px; padding: 7px 13px; font-size: 13px; cursor: pointer; }
  .addbtn:hover { border-color: var(--muted); }
  .ai-toggle { cursor: pointer; user-select: none; }
  .docbar { display:flex; align-items:center; gap:10px; margin: 0 auto 14px; max-width:900px; }

  /* doc-view sidebar; shifts content right so it never overlaps. Below the
     breakpoint the sidebar hides and the docbar button is the fallback. */
  .docside { position:fixed; left:18px; top:116px; z-index:6; display:none; flex-direction:column; gap:7px; width:196px; }
  @media (min-width:1000px) {
    body.reading .docbar { display:none; }               /* sidebar is the control */
    body.reading.sidebar .docside { display:flex; }       /* Cmd+B toggles the .sidebar class */
    body.reading.sidebar main { margin-left:230px; }
  }
  .docside .sect { color:var(--muted); font-size:11px; text-transform:uppercase; letter-spacing:.07em; margin:14px 6px 3px; }
  .docside .sbtn { display:flex; align-items:center; gap:10px; padding:9px 12px; border:1px solid var(--line); background:var(--card); color:var(--accent); border-radius:9px; cursor:pointer; font:inherit; font-size:13px; text-align:left; width:100%; }
  .docside .sbtn:hover { border-color:var(--muted); }
  .docside .sbtn.active { background:var(--accent); color:var(--card); border-color:var(--accent); }
  .docside .sbtn .ico { width:16px; text-align:center; opacity:.85; font-size:14px; }
  .docside .sbtn .k { margin-left:auto; font-size:11px; color:var(--muted); border:1px solid var(--line); border-radius:4px; padding:1px 5px; }
  .docside .sbtn.active .k { color:inherit; border-color:currentColor; opacity:.7; }

  /* ---- full PDF.js viewer overlay ---- */
  #pv { position: fixed; inset: 0; z-index: 45; background: var(--bg); display: none; flex-direction: column; }
  #pv.show { display: flex; }
  #pv .pvbar { display: flex; align-items: center; gap: 12px; padding: 8px 14px; background: var(--card); border-bottom: 1px solid var(--line); }
  #pv .pvtitle { font-weight: 600; font-size: 14px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  #pv iframe { flex: 1; border: 0; width: 100%; }

  /* ---- compose modal + status chip ---- */
  #cmp { position: fixed; inset: 0; z-index: 40; background: rgba(15,15,17,.6); display: none; place-items: center; }
  #cmp.show { display: grid; }
  #cmp .box { background: var(--card); border: 1px solid var(--line); border-radius: 12px; width: min(560px, calc(100vw - 40px)); padding: 20px; box-shadow: 0 12px 48px rgba(0,0,0,.3); }
  #cmp h3 { margin: 0 0 6px; font-size: 16px; }
  #cmp .sub { color: var(--muted); font-size: 13px; margin-bottom: 14px; line-height: 1.45; }
  #cmp input[type=text], #cmp textarea { width: 100%; border: 1px solid var(--line); border-radius: 8px; background: var(--bg); color: var(--accent); font: inherit; font-size: 14px; padding: 9px 11px; }
  #cmp textarea { min-height: 150px; resize: vertical; margin-top: 10px; }
  #cmp .row { display: flex; gap: 10px; justify-content: flex-end; margin-top: 14px; }
  #cmpchip { position: fixed; right: 18px; bottom: 18px; z-index: 25; background: var(--card); border: 1px solid var(--line); border-radius: 10px; padding: 10px 14px; font-size: 13px; box-shadow: 0 6px 24px rgba(0,0,0,.18); display: none; align-items: center; gap: 9px; max-width: 340px; }
  #cmpchip.show { display: flex; }
  #cmpchip .spin { width: 12px; height: 12px; border: 2px solid var(--line); border-top-color: var(--accent); border-radius: 50%; animation: cspin 1s linear infinite; flex: none; }
  @keyframes cspin { to { transform: rotate(360deg); } }

  /* ---- margin editor ---- */
  #med { position: fixed; inset: 0; z-index: 40; background: rgba(15,15,17,.86); display:none; }
  #med.show { display: grid; grid-template-rows: auto 1fr auto; }
  #med .mhead, #med .mfoot { display:flex; align-items:center; gap:14px; padding:12px 18px; color:#e8e8e4; }
  #med .mhead { border-bottom:1px solid rgba(255,255,255,.12); }
  #med .mfoot { border-top:1px solid rgba(255,255,255,.12); flex-wrap:wrap; }
  #med .mtitle { font-weight:600; }
  #med .mspacer { flex:1; }
  #med .mbtn { border:1px solid rgba(255,255,255,.3); background:transparent; color:#e8e8e4; border-radius:8px; padding:7px 14px; font-size:13px; cursor:pointer; }
  #med .mbtn:hover { border-color:#fff; }
  #med .mbtn.primary { background:#f0a020; border-color:#f0a020; color:#1a1a1a; font-weight:600; }
  #med .mbtn:disabled { opacity:.45; cursor:default; }
  #med .mnav { display:flex; align-items:center; gap:10px; color:#cfcfca; font-size:13px; }
  #med .mnav button { width:30px; height:30px; border-radius:50%; border:1px solid rgba(255,255,255,.3); background:transparent; color:#e8e8e4; cursor:pointer; font-size:15px; }
  #med .mnav button:disabled { opacity:.35; cursor:default; }
  #med .mread { color:#cfcfca; font-size:12.5px; font-variant-numeric:tabular-nums; }
  #med .mhint { color:#8a8a86; font-size:12px; margin-left:14px; }
  #med .mstage-wrap { display:grid; place-items:center; overflow:hidden; padding:16px; }
  /* the stage is sized in JS to the SOURCE page's aspect (it shows the whole
     page for a photo-style crop), so no fixed aspect-ratio here */
  #med .mstage { position:relative; background:#fbfbf9; box-shadow:0 4px 30px rgba(0,0,0,.5); touch-action:none; }
  /* Everything (page preview, margin shade, box, handles) is drawn on ONE
     canvas with coordinate hit-testing — no DOM overlays — so dark-mode
     browser extensions (Dark Reader) can't invert the page or paint over the
     box interior. Canvas pixels are left alone. */
  #med .medcanvas { position:absolute; left:0; top:0; touch-action:none; cursor:default; }
  #med .mattach { color:#e8e8e4; text-align:center; place-self:center; max-width:460px; line-height:1.6; }
  #med .mattach .mbtn { margin-top:14px; }
</style>
</head>
<body>
<header>
  <span class="brand" id="brand">Papier</span>
  <span id="crumb"></span>
  <span class="spacer"></span>
  <span class="badge" id="badge"><span class="dot"></span>synced view</span>
  <button class="addbtn" id="compose-btn">✦ Compose</button>
  <button class="addbtn" id="add">+ Add document</button>
</header>
<main id="view"><div class="empty">Loading…</div></main>
<input type="file" id="file" multiple hidden>
<div id="drop"><div class="box">Drop files to add them to Papier</div></div>
<div id="med"></div>
<div id="pv"><div class="pvbar"><span class="pvtitle" id="pv-title"></span><span class="spacer"></span><button class="addbtn" id="pv-close">✕ Close</button></div><iframe id="pv-frame" title="PDF viewer"></iframe></div>
<div id="cmp"><div class="box">
  <h3>✦ Compose a document</h3>
  <div class="sub">Paste links and/or describe what you want. An agent on the server researches it, writes a typeset article, and adds the PDF to Papier — it syncs to your tablet like any upload. Takes a few minutes.</div>
  <input type="text" id="cmp-title" placeholder="Title (optional)">
  <textarea id="cmp-instr" placeholder="e.g. https://arxiv.org/abs/2405.12345 — teach me this paper properly, with the math worked through and a running example…"></textarea>
  <div class="row"><button class="addbtn" id="cmp-cancel">Cancel</button><button class="addbtn" id="cmp-go" style="background:var(--accent);color:var(--card)">Create</button></div>
</div></div>
<div id="cmpchip"></div>
<div class="toast" id="toast"></div>

<script>
const DATA = '/papier/data/';
const INBOUND = '/papier/inbound/';   // web-dropped docs pending tablet sync
const UPLOAD = '/papier/upload';
const API = '/papier/api/';           // crop editor: source-status, preview, render, attach
const LIBRARY = API + 'library';
const bust = {};                     // docId -> cache-bust token, bumped after a re-render
const bustq = (id) => bust[id] ? ('?v=' + bust[id]) : '';   // so new pages load, not the cached ones
const PAGE_W = 1404, PAGE_H = 1872, POLL_MS = 60000;
const $ = (id) => document.getElementById(id);
const $view = $('view');
const PERF_START = performance.now();
const paperPerf = window.__paperPerf = {};
function perfMark(name) {
  const ms = Math.round(performance.now() - PERF_START);
  paperPerf[name] = ms;
  document.documentElement.dataset['papier' + name[0].toUpperCase() + name.slice(1) + 'Ms'] = String(ms);
  return ms;
}

const state = {
  folder: null,        // current folder ("" = root, null = not loaded)
  docs: [],            // [{id, meta, mtime}]
  folders: [],         // folder names
  open: null,          // {id, meta, seq, pages:[...]}
  aiBlue: true,
  sig: '',             // doc-set signature for change detection
};

/* ---------- fetch helpers ---------- */
/* `base` selects the mirror (DATA) or the inbound/pending source (INBOUND) */
async function jidxB(base, path) { const r = await fetch(base + path, {cache:'no-store'}); if (!r.ok) throw 0; return r.json(); }
async function jfileB(base, path){ const r = await fetch(base + path, {cache:'no-store'}); if (!r.ok) return null; return r.json(); }
async function jidx(path) { return jidxB(DATA, path); }
async function jfile(path){ return jfileB(DATA, path); }
async function tfile(path){ const r = await fetch(DATA + path, {cache:'no-store'}); if (!r.ok) return null; return r.text(); }
const pad4 = (n) => String(n).padStart(4, '0');
const withVersion = (url, version) => version ? url + (url.includes('?') ? '&' : '?') + 'v=' + encodeURIComponent(version) : url;
const relDate = (ms) => {
  if (!ms) return '';
  const d = Math.floor((Date.now() - ms) / 86400000);
  return d <= 0 ? 'today' : d === 1 ? 'yesterday' : d + ' days ago';
};

/* ---------- data model ---------- */
async function loadFrom(base, pending) {
  let idx; try { idx = await jidxB(base, 'docs/'); } catch { idx = []; }
  const dirs = idx.filter(e => e.type === 'directory');
  const docs = [];
  for (const e of dirs) {
    const id = e.name.replace(/\/$/, '');   // autoindex omits the trailing slash
    const meta = await jfileB(base, 'docs/' + id + '/meta.json');
    if (!meta) continue;
    const kind = meta.kind === 'notebook' ? 'notebook' : (meta.pages > 0 ? 'book' : null);
    if (!kind) continue;
    docs.push({ id, base, pending, meta: {...meta, kind}, mtime: Date.parse(e.mtime) || 0 });
  }
  return docs;
}

async function loadDocsLegacy() {
  const mirror = await loadFrom(DATA, false);
  const inbound = await loadFrom(INBOUND, true);
  /* a doc that has made it to the tablet mirror supersedes its pending copy */
  const have = new Set(mirror.map(d => d.id));
  const docs = mirror.concat(inbound.filter(d => !have.has(d.id)));
  const fol = await jfile('folders.json');
  state.folders = (fol && fol.folders) || [];
  for (const d of docs) if (d.meta.folder && !state.folders.includes(d.meta.folder)) state.folders.push(d.meta.folder);
  state.folders.sort();
  docs.sort((a, b) => b.mtime - a.mtime);
  state.docs = docs;
  const sig = docs.map(d => d.id + ':' + d.mtime).join('|') + '#' + state.folders.join(',');
  const changed = sig !== state.sig; state.sig = sig;
  return changed;
}

async function loadDocs() {
  try {
    const r = await fetch(LIBRARY, { cache: 'no-cache' });
    if (!r.ok) throw new Error('library ' + r.status);
    const library = await r.json();
    if (!library || !Array.isArray(library.docs)) throw new Error('bad library');
    state.docs = library.docs;
    state.folders = Array.isArray(library.folders) ? library.folders : [];
    const sig = library.generation || JSON.stringify([state.docs.map(d => [d.id, d.version]), state.folders]);
    const changed = sig !== state.sig; state.sig = sig;
    perfMark('library');
    return changed;
  } catch (err) {
    console.warn('Papier library endpoint unavailable; using legacy index', err);
    return loadDocsLegacy();
  }
}

/* ---------- PDF.js: render books straight from the source PDF ---------- */
/* Books uploaded via the web retain their source PDF on the server (the crop
 * editor uses it). Rendering THAT with PDF.js means one cached download for
 * the whole document instead of a ~150KB PNG + ink round trip per page — and
 * crisp vector text at any zoom/DPR instead of a fixed 1404px raster. */
const PDFJS_VER = '4.8.69';
const PDFJS_URL = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/' + PDFJS_VER + '/pdf.min.mjs';
const PDFJS_WORKER = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/' + PDFJS_VER + '/pdf.worker.min.mjs';
let pdfjsPromise = null;
function ensurePdfjs() {
  if (!pdfjsPromise) {
    pdfjsPromise = import(PDFJS_URL).then((m) => { m.GlobalWorkerOptions.workerSrc = PDFJS_WORKER; return m; });
    pdfjsPromise.catch(() => { pdfjsPromise = null; });
  }
  return pdfjsPromise;
}
// Start loading a book's source PDF; resolves null on any failure so the
// viewer falls back to the pre-rendered raster pages.
function startSourcePdf(d) {
  if (d.meta.kind !== 'book' || !d.hasSource) return null;
  const url = API + 'source-pdf?id=' + encodeURIComponent(d.id) + (d.srcVersion ? '&v=' + d.srcVersion : '');
  return ensurePdfjs()
    .then((pdfjs) => pdfjs.getDocument({ url }).promise)
    .catch((err) => { console.warn('source PDF unavailable; using raster pages', err); return null; });
}
// Replicate mkbook.py's placement so PDF.js pages align pixel-for-pixel with
// the tablet raster — ink annotations land exactly where they do on device.
const CROP_BORDER = 30;   // device px, same constant as mkbook.py
function pagePlacement(meta, pw, ph) {
  if (Array.isArray(meta.crop) && meta.crop.length === 4) {
    const [cx0, cy0, cx1, cy1] = meta.crop;
    const cw = (cx1 - cx0) * pw, ch = (cy1 - cy0) * ph;
    const k = Math.min((PAGE_W - 2 * CROP_BORDER) / cw, (PAGE_H - 2 * CROP_BORDER) / ch);
    return { k, ox: (PAGE_W - cw * k) / 2, oy: (PAGE_H - ch * k) / 2, sx: cx0 * pw, sy: cy0 * ph };
  }
  const m = Array.isArray(meta.margins) && meta.margins.length === 4 ? meta.margins : [40, 40, 40, 40];
  const bw = PAGE_W - m[0] - m[2], bh = PAGE_H - m[1] - m[3];
  const k = Math.min(bw / pw, bh / ph);
  return { k, ox: m[0] + (bw - pw * k) / 2, oy: m[1] + (bh - ph * k) / 2, sx: 0, sy: 0 };
}

/* ---------- rendering: shared stroke drawer (papier/notebook JSON) ---------- */
function drawInk(ctx, doc, scale) {
  if (!doc) return;
  ctx.save(); ctx.lineCap = ctx.lineJoin = 'round'; ctx.scale(scale, scale);
  const strokes = [];
  (doc.strokes || []).forEach(s => strokes.push([s, false]));
  (doc.patches || []).forEach(p => (p.strokes || []).forEach(s => strokes.push([s, true])));
  for (const [s, isAI] of strokes) {
    const f = s.p; if (!f || f.length < 3) continue;
    const ai = isAI || s.g > 0;
    ctx.strokeStyle = ctx.fillStyle = (ai && state.aiBlue) ? '#2457c5' : '#1c1c1c';
    if (f.length === 3) { ctx.beginPath(); ctx.arc(f[0]/10, f[1]/10, Math.max(f[2]/10, 1), 0, 7); ctx.fill(); continue; }
    ctx.beginPath(); ctx.lineWidth = Math.max((f[2]/10)*2, 1.4);
    ctx.moveTo(f[0]/10, f[1]/10);
    for (let i = 3; i < f.length; i += 3) ctx.lineTo(f[i]/10, f[i+1]/10);
    ctx.stroke();
  }
  /* typeset (Garamond) runs: rendered in the real font, the browser's own
   * high-quality glyphs — pi ink blue, user black */
  ctx.textBaseline = 'alphabetic';
  (doc.patches || []).forEach(p => (p.texts || []).forEach(t => {
    const ai = t.g > 0;
    ctx.fillStyle = (ai && state.aiBlue) ? '#2457c5' : '#1c1c1c';
    ctx.font = (t.s / 10) + "px 'EB Garamond', Garamond, Georgia, serif";
    ctx.fillText(t.t, t.x / 10, t.y / 10);
  }));
  ctx.restore();
}

/* thumbnail: entry 0 at small scale */
async function thumbCanvas(d) {
  const c = document.createElement('canvas');
  const scale = 0.18;
  c.width = Math.round(PAGE_W * scale); c.height = Math.round(PAGE_H * scale);
  const ctx = c.getContext('2d');
  ctx.fillStyle = '#fbfbf9'; ctx.fillRect(0, 0, c.width, c.height);
  const st = await jfileB(d.base, 'docs/' + d.id + '/state.json');
  const e0 = st && st.seq && st.seq[0];
  if (d.meta.kind === 'book') {
    const pnum = e0 && e0.p != null ? e0.p : 0;
    const img = await loadImage(d.base + 'docs/' + d.id + '/pages/' + pad4(pnum + 1) + '.png' + bustq(d.id)).catch(()=>null);
    if (img) ctx.drawImage(img, 0, 0, PAGE_W*scale, PAGE_H*scale);
    const ink = await jfileB(d.base, 'docs/' + d.id + '/ink/pdf-' + pad4(pnum + 1) + '.json');
    drawInk(ctx, ink, scale);
  } else {
    const nid = e0 && e0.n != null ? e0.n : 1;
    const ink = await jfileB(d.base, 'docs/' + d.id + '/ink/note-' + pad4(nid) + '.json');
    drawInk(ctx, ink, scale);
  }
  return c;
}

const imageCache = new Map();
const jsonCache = new Map();
function loadImage(url) {
  if (imageCache.has(url)) return imageCache.get(url);
  const pending = new Promise((res, rej) => {
    const img = new Image();
    img.onload = () => res(img);
    img.onerror = rej; img.src = url;
  });
  imageCache.set(url, pending);
  pending.catch(() => imageCache.delete(url));
  return pending;
}
function cachedJson(url) {
  if (!jsonCache.has(url)) {
    jsonCache.set(url, fetch(url).then(r => r.ok ? r.json() : null).catch(() => null));
  }
  return jsonCache.get(url);
}
function inkKey(e) {
  if (e && e.p != null) return 'pdf-' + pad4(e.p + 1);
  if (e && e.n != null) return 'note-' + pad4(e.n);

async function openDoc(d) {
  let seq = Array.isArray(d.seq) ? d.seq : null;
  if (!seq) {
    const st = await jfileB(d.base, 'docs/' + d.id + '/state.json');
    seq = (st && st.seq) || [];
  }
  state.open = { ...d, seq, pdfPromise: startSourcePdf(d) };
  buildSidebar(d);
  $('crumb').innerHTML = '  ›  <span class="crumb" id="home-crumb">My files</span>  ›  ' + esc(d.meta.title || d.id);
  const hc = $('home-crumb'); if (hc) hc.onclick = () => { state.folder = d.meta.folder || null; renderHome(); };

  $view.innerHTML = '';
  if (d.meta.kind === 'book') {
    const bar = document.createElement('div'); bar.className = 'docbar';
    const btn = document.createElement('button'); btn.className = 'addbtn';
    btn.textContent = '⌸  Adjust margins';
    btn.onclick = () => openMarginEditor(d);
    bar.appendChild(btn);
    const pvb = document.createElement('button'); pvb.className = 'addbtn';
    pvb.textContent = '⤡  PDF viewer';
    pvb.onclick = () => openPdfViewer(d);
    bar.appendChild(pvb);
    $view.appendChild(bar);
  }
  const wrap = document.createElement('div'); wrap.className = 'pages';
  $view.appendChild(wrap);
  /* Lazy render: a big book has hundreds of pages — allocating a full-size
   * canvas for each up front (~10 MB each) freezes the browser. Instead each
   * page is just a sized div; a canvas is created + drawn only when the page
   * nears the viewport, and freed again when it scrolls far away. */
  if (openDoc._io) openDoc._io.disconnect();
  /* PDF.js pages render locally from the already-downloaded PDF, so a much
   * larger lookahead costs nothing over the network; raster pages get a
   * bigger margin too so scrolling stalls on fewer cold fetches. */
  const lookahead = state.open.pdfPromise ? '3600px 0px' : '2400px 0px';
  const io = new IntersectionObserver((entries) => {
    for (const en of entries) {
      const p = en.target;
      if (en.isIntersecting) {
        if (!p._cv) {
          const cv = document.createElement('canvas');
          if (state.open && state.open.pdfPromise) {
            /* vector source: size the canvas to the DISPLAYED px × DPR for
             * crisp text (the fixed 1404px raster is what looked soft) */
            const dpr = Math.min(window.devicePixelRatio || 1, 2.5);
            const w = Math.min(Math.round((p.clientWidth || 900) * dpr), 2160);
            cv.width = w; cv.height = Math.round(w * PAGE_H / PAGE_W);
          } else { cv.width = PAGE_W; cv.height = PAGE_H; }
          p.insertBefore(cv, p.firstChild); p._cv = cv;
          renderPage(cv, state.open, p._entry);
        }
      } else if (p._cv) {
        p._cv._renderToken = (p._cv._renderToken || 0) + 1;
        if (p._cv._renderTask) { try { p._cv._renderTask.cancel(); } catch (_) {} p._cv._renderTask = null; }
        p._cv.remove(); p._cv = null;
      }
    }
  }, { rootMargin: lookahead });
  openDoc._io = io;
  for (let i = 0; i < seq.length; i++) {
    const e = seq[i];
    const page = document.createElement('div'); page.className = 'page'; page._entry = e;
    const lbl = document.createElement('div'); lbl.className = 'plabel';
    lbl.textContent = (i + 1) + ' / ' + seq.length + (e.p != null ? '  ·  p.' + (e.p + 1) : '');
    page.appendChild(lbl);
    wrap.appendChild(page);
    io.observe(page);
  }
  /* warm the ink cache: the library lists exactly which ink files exist, and
   * they are tiny — prefetching them removes one round trip per page later */
  const version = bust[d.id] || d.version;
  (Array.isArray(d.ink) ? d.ink : []).slice(0, 80).forEach((key) =>
    cachedJson(withVersion(d.base + 'docs/' + d.id + '/ink/' + key + '.json', version)));
}

async function renderPage(cv, d, e) {
  const token = (cv._renderToken || 0) + 1; cv._renderToken = token;
  const ctx = cv.getContext('2d');
  const S = cv.width / PAGE_W;   // canvas px per device px (1 on the raster path)
  ctx.setTransform(1, 0, 0, 1, 0, 0);
  ctx.fillStyle = '#fbfbf9'; ctx.fillRect(0, 0, cv.width, cv.height);
  const version = bust[d.id] || d.version;
  const key = inkKey(e);
  const inkPromise = key && hasInk(d, key)
    ? cachedJson(withVersion(d.base + 'docs/' + d.id + '/ink/' + key + '.json', version))
    : Promise.resolve(null);
  if (e.p != null) {
    let drawn = false;
    if (d.pdfPromise) {
      try {
        const pdf = await d.pdfPromise;
        if (cv._renderToken !== token) return;
        if (pdf) {
          const page = await pdf.getPage(e.p + 1);
          if (cv._renderToken !== token) return;
          const vp1 = page.getViewport({ scale: 1 });
          const pl = pagePlacement(d.meta || {}, vp1.width, vp1.height);
          if (cv._renderTask) { try { cv._renderTask.cancel(); } catch (_) {} }
          const task = page.render({
            canvasContext: ctx,
            viewport: page.getViewport({ scale: pl.k }),
            transform: [S, 0, 0, S, (pl.ox - pl.sx * pl.k) * S, (pl.oy - pl.sy * pl.k) * S],
            background: '#fbfbf9',
          });
          cv._renderTask = task;
          await task.promise;
          cv._renderTask = null;
          if (cv._renderToken !== token) return;
          drawn = true;
        }
      } catch (err) {
        if (err && err.name === 'RenderingCancelledException') return;
        console.warn('PDF.js page render failed; using raster page', err);
      }
    }
    if (!drawn) {
      const img = await loadImage(withVersion(d.base + 'docs/' + d.id + '/pages/' + pad4(e.p + 1) + '.png', version)).catch(() => null);
      if (cv._renderToken !== token) return;
      if (img) ctx.drawImage(img, 0, 0, cv.width, cv.height);
    }
    const ink = await inkPromise;
    if (cv._renderToken !== token) return;
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    drawInk(ctx, ink, S);
  } else if (e.n != null) {
    const ink = await inkPromise;
    if (cv._renderToken !== token) return;
    drawInk(ctx, ink, S);
  }
}

/* ---------- compose (agentic doc creation) ---------- */
/* ✦ Compose: instructions/links -> POST /papier/api/compose -> a pi agent on
 * the VM researches + writes + typesets a PDF -> it enters the normal upload
 * path and appears in the library (then on the tablet). The job id lives in
 * localStorage so a reload keeps tracking the run. */
const COMPOSE_KEY = 'papier-compose-job';
let composeTimer = null;
function composeModal(show) { $('cmp').classList.toggle('show', !!show); if (show) $('cmp-instr').focus(); }
function chipShow(text, spinning) {
  const c = $('cmpchip');
  c.innerHTML = (spinning ? '<span class="spin"></span>' : '') + '<span>' + esc(text) + '</span>';
  c.classList.add('show');
}
function chipHide() { $('cmpchip').classList.remove('show'); }
async function submitCompose() {
  const instructions = $('cmp-instr').value.trim();
  const title = $('cmp-title').value.trim();
  if (!instructions) { toast('Describe what to create (or paste links) first.'); return; }
  const btn = $('cmp-go'); btn.disabled = true; btn.textContent = 'Starting…';
  try {
    const r = await fetch(API + 'compose', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ instructions, title }) });
    const j = await r.json().catch(() => null);
    if (!r.ok || !j || !j.ok) throw new Error((j && j.error) || ('compose ' + r.status));
    localStorage.setItem(COMPOSE_KEY, j.job);
    composeModal(false); $('cmp-instr').value = ''; $('cmp-title').value = '';
    watchCompose(j.job);
  } catch (err) { toast('Compose failed to start: ' + err.message, 5000); }
  btn.disabled = false; btn.textContent = 'Create';
}
function watchCompose(job) {
  clearInterval(composeTimer);
  chipShow('Composing…', true);
  const poll = async () => {
    let j = null;
    try {
      const r = await fetch(API + 'compose-status?job=' + encodeURIComponent(job), { cache: 'no-store' });
      j = await r.json().catch(() => null);
      if (r.status === 404) { clearInterval(composeTimer); composeTimer = null; localStorage.removeItem(COMPOSE_KEY); chipHide(); return; }
    } catch (_) { return; }   // transient network error: keep polling
    if (!j) return;
    if (j.status === 'running' || j.status === 'rendering') {
      chipShow((j.title ? j.title + ' — ' : '') + (j.phase || 'working…'), true);
      return;
    }
    clearInterval(composeTimer); composeTimer = null;
    localStorage.removeItem(COMPOSE_KEY);
    if (j.status === 'done') {
      chipHide();
      toast('“' + (j.title || j.docId) + '” is ready — syncing to your tablet.', 8000);
      state.sig = ''; refresh();
    } else {
      chipShow('Compose failed: ' + (j.error || 'unknown error'), false);
      setTimeout(chipHide, 15000);
    }
  };
  poll();
  composeTimer = setInterval(poll, 5000);
}

/* ---------- crop editor ---------- */
/* Photo-crop UX: the stage shows the FULL source page; drag a box around the
 * content to KEEP; everything outside fades. That kept region is what fills
 * the reMarkable screen on render, so cropping a PDF's wasteful margins makes
 * the text BIGGER. The crop lives in page FRACTIONS (0..1) so it applies to
 * every page. Drawn on one canvas (Dark-Reader-proof). */
const MIN_FRAC = 0.08;
const HANDLES = [['nw',0,0],['n',.5,0],['ne',1,0],['e',1,.5],['se',1,1],['s',.5,1],['sw',0,1],['w',0,.5]];
const CURSORS = { nw:'nwse-resize', se:'nwse-resize', ne:'nesw-resize', sw:'nesw-resize', n:'ns-resize', s:'ns-resize', e:'ew-resize', w:'ew-resize', move:'move' };
const med = { id: null, pages: 0, page: 0, crop: null, orig: null, pageImg: null, sw: 0, sh: 0 };

const boxFromCrop = (c) => ({ x: c[0], y: c[1], w: c[2] - c[0], h: c[3] - c[1] });   // [x0,y0,x1,y1] -> box
const cropArray = (b) => [b.x, b.y, b.x + b.w, b.y + b.h].map(v => Math.max(0, Math.min(1, v)));

async function openMarginEditor(d) {
  const el = $('med'); el.className = 'show';

  let st = null;
  for (let t = 0; t < 3 && !st; t++) {   // retry: the service may be mid-render on a fresh upload
    try { const r = await fetch(API + 'source-status?id=' + encodeURIComponent(d.id), { cache: 'no-store' }); if (r.ok) st = await r.json(); } catch (_) {}
    if (!st) await new Promise(r => setTimeout(r, 500));
  }
  if (!st || !st.ok) { el.querySelector('.mattach').textContent = 'Could not reach the editor service — try again in a moment.'; return; }
  if (!st.hasSource) return renderAttach(d);
  med.id = d.id; med.doc = d; med.pages = st.pages || 1; med.page = 0; med.pageImg = null;
  med.orig = st.orig || [0, 0, 1, 1];

  $('med-save').onclick = saveCrop;

function gotoPage(p) {
  med.page = clamp(p, 0, med.pages - 1);
  $('med-pg').textContent = 'page ' + (med.page + 1) + ' / ' + med.pages;
  $('med-prev').disabled = med.page === 0;
  $('med-next').disabled = med.page === med.pages - 1;
  const want = med.page;
  const im = new Image();
  im.onload = () => { if (med.page === want) { med.pageImg = im; sizeStage(im.naturalWidth, im.naturalHeight); layoutBox(); } };
  im.src = API + 'preview?id=' + encodeURIComponent(med.id) + '&page=' + med.page;
  if (med.pageImg) layoutBox();   // keep the last page visible until the new one loads
  if (med.page + 1 < med.pages) { const nx = new Image(); nx.src = API + 'preview?id=' + encodeURIComponent(med.id) + '&page=' + (med.page + 1); }

// size the stage to the SOURCE page's aspect, as big as fits the viewport
function sizeStage(iw, ih) {
  const stage = $('med-stage'); if (!stage) return;
  const A = iw / ih, maxH = window.innerHeight * 0.80, maxW = window.innerWidth - 56;
  let h = maxH, w = h * A; if (w > maxW) { w = maxW; h = w / A; }
  stage.style.width = Math.round(w) + 'px'; stage.style.height = Math.round(h) + 'px';
}

/* draw the full source page, fade everything outside the crop, then the box +
 * handles — all on one canvas so Dark Reader can't touch it. */
function layoutBox() {
  const stage = $('med-stage'), cv = $('med-canvas'); if (!stage || !cv) return;
  const r = stage.getBoundingClientRect(), W = r.width, H = r.height;
  med.sw = W; med.sh = H;
  const dpr = window.devicePixelRatio || 1;
  cv.width = Math.round(W * dpr); cv.height = Math.round(H * dpr);
  cv.style.width = W + 'px'; cv.style.height = H + 'px';
  const ctx = cv.getContext('2d'); ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.fillStyle = '#fbfbf9'; ctx.fillRect(0, 0, W, H);
  if (med.pageImg) ctx.drawImage(med.pageImg, 0, 0, W, H);   // whole source page fills the stage
  const b = med.crop, bx = b.x * W, by = b.y * H, bw = b.w * W, bh = b.h * H;
  ctx.fillStyle = 'rgba(12,12,15,0.60)';   // fade what gets cropped away
  ctx.fillRect(0, 0, W, by); ctx.fillRect(0, by + bh, W, H - (by + bh));
  ctx.fillRect(0, by, bx, bh); ctx.fillRect(bx + bw, by, W - (bx + bw), bh);
  ctx.strokeStyle = '#f0a020'; ctx.lineWidth = 1.5; ctx.strokeRect(bx, by, bw, bh);
  for (const [, fx, fy] of HANDLES) {
    ctx.beginPath(); ctx.arc(bx + fx * bw, by + fy * bh, 6, 0, 7);
    ctx.fillStyle = '#f0a020'; ctx.fill(); ctx.lineWidth = 2; ctx.strokeStyle = '#fff'; ctx.stroke();
  }
  $('med-read').textContent = 'keeping ' + Math.round(b.w * 100) + '% × ' + Math.round(b.h * 100) + '% of the page';
}

const toStage = (e) => { const r = $('med-stage').getBoundingClientRect(); return { sx: e.clientX - r.left, sy: e.clientY - r.top }; };
function hitTest(sx, sy) {   // in stage pixels
  const b = med.crop, W = med.sw, H = med.sh, R = 22;
  for (const [name, fx, fy] of HANDLES) {
    if (Math.abs(sx - (b.x + fx * b.w) * W) <= R && Math.abs(sy - (b.y + fy * b.h) * H) <= R) return name;
  }
  return (sx >= b.x * W && sx <= (b.x + b.w) * W && sy >= b.y * H && sy <= (b.y + b.h) * H) ? 'move' : null;
}

function setupBoxDrag() {
  const cv = $('med-canvas');
  let mode = null, start = null, sp = null;
  const move = (e) => {
    const { sx, sy } = toStage(e);
    const dx = (sx - sp.sx) / med.sw, dy = (sy - sp.sy) / med.sh;   // fraction deltas
    let { x, y, w, h } = start;
    if (mode === 'move') {
      x = clamp(start.x + dx, 0, 1 - w); y = clamp(start.y + dy, 0, 1 - h);
    } else {
      if (mode.includes('w')) { const nx = clamp(start.x + dx, 0, start.x + start.w - MIN_FRAC); w = start.w + (start.x - nx); x = nx; }
      if (mode.includes('e')) { w = clamp(start.w + dx, MIN_FRAC, 1 - start.x); }
      if (mode.includes('n')) { const ny = clamp(start.y + dy, 0, start.y + start.h - MIN_FRAC); h = start.h + (start.y - ny); y = ny; }
      if (mode.includes('s')) { h = clamp(start.h + dy, MIN_FRAC, 1 - start.y); }
    }
    med.crop = { x, y, w, h }; layoutBox();
  };
  const end = () => { window.removeEventListener('pointermove', move); mode = null; };
  cv.addEventListener('pointerdown', (e) => {
    const { sx, sy } = toStage(e); const m = hitTest(sx, sy);
    if (!m) return;
    e.preventDefault(); mode = m; start = { ...med.crop }; sp = { sx, sy };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', end, { once: true });
  });
  cv.addEventListener('pointermove', (e) => {   // hover cursor
    if (mode) return;
    const { sx, sy } = toStage(e); const m = hitTest(sx, sy);
    cv.style.cursor = m ? CURSORS[m] : 'default';
  });
}

async function saveCrop() {
  const c = cropArray(med.crop);
  const d = med.doc, id = med.id;
  const btn = $('med-save'); btn.disabled = true; btn.textContent = 'Rendering…';
  try {
    const r = await fetch(API + 'render-job', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ id, crop: c }) });
    const j = await r.json(); if (!j.ok || !j.job) throw new Error(j.error || 'render failed');
    const deadline = Date.now() + 300000;
    while (Date.now() < deadline) {
      const sr = await fetch(API + 'render-status?job=' + encodeURIComponent(j.job), { cache: 'no-store' });
      const status = await sr.json();
      if (!sr.ok || !status.ok) throw new Error(status.error || 'render status failed');
      if (status.status === 'failed') throw new Error(status.error || 'render failed');
      if (status.status === 'done') break;
      btn.textContent = status.total && status.page
        ? `Rendering ${status.page} / ${status.total}…`
        : 'Preparing render…';
      await new Promise(resolve => setTimeout(resolve, 750));
    }
    if (Date.now() >= deadline) throw new Error('render timed out');
    bust[id] = Date.now();          // force the viewer to load the NEW pages, not the cached ones
    closeEditor();
    toast('Cropped & re-rendered — reaches your tablet on the next sync (~90s).', 6000);
    if (d) openDoc(d); else setTimeout(refresh, 1000);   // re-open so you see the new pages now
  } catch (err) { toast('Render failed: ' + err.message, 5000); btn.disabled = false; btn.innerHTML = 'Save &amp; push'; }
}

function closeEditor() { const el = $('med'); el.className = ''; el.innerHTML = ''; }
function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
window.addEventListener('resize', () => { if ($('med').classList.contains('show') && med.pageImg && $('med-stage')) { sizeStage(med.pageImg.naturalWidth, med.pageImg.naturalHeight); layoutBox(); } });
window.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    if ($('pv').classList.contains('show')) closePdfViewer();       // PDF viewer overlay first
    else if ($('cmp').classList.contains('show')) composeModal(false);
    else if ($('med').classList.contains('show')) closeEditor();    // then the crop editor
    else if (state.open) goFiles();                                  // then: back to My files
    return;
  }
  if ((e.metaKey || e.ctrlKey) && (e.key === 'b' || e.key === 'B')) {   // Cmd/Ctrl+B: toggle the sidebar
    if (state.open) { e.preventDefault(); toggleSidebar(); }
  }
});

/* ---------- poll / boot ---------- */
let refreshBusy = false;
async function refresh() {
  if (state.open || document.hidden || refreshBusy) return;
  refreshBusy = true;
  try {
    const changed = await loadDocs();
    if (changed || $view.querySelector('.empty')) renderHome();
  } finally { refreshBusy = false; }
}
function esc(s) { return String(s == null ? '' : s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

$('brand').onclick = () => { state.folder = null; renderHome(); };
$('add').onclick = () => $('file').click();
$('compose-btn').onclick = () => composeModal(true);
$('cmp-cancel').onclick = () => composeModal(false);
$('cmp-go').onclick = submitCompose;
$('cmp').addEventListener('click', (e) => { if (e.target.id === 'cmp') composeModal(false); });
$('pv-close').onclick = closePdfViewer;
$('file').onchange = (e) => upload(e.target.files);
let dragN = 0;
window.addEventListener('dragenter', (e) => { e.preventDefault(); if (dragN++ === 0) $('drop').classList.add('show'); });
window.addEventListener('dragover', (e) => e.preventDefault());
window.addEventListener('dragleave', () => { if (--dragN <= 0) { dragN = 0; $('drop').classList.remove('show'); } });
window.addEventListener('drop', (e) => { e.preventDefault(); dragN = 0; $('drop').classList.remove('show'); if (e.dataTransfer.files.length) upload(e.dataTransfer.files); });
document.addEventListener('visibilitychange', () => { if (!document.hidden && !state.open) refresh(); });

(async function boot() {
  const pendingCompose = localStorage.getItem(COMPOSE_KEY);
  if (pendingCompose) watchCompose(pendingCompose);
  await loadDocs();
  renderHome();
  perfMark('ready');
  console.info('Papier ready', paperPerf);
  setInterval(refresh, POLL_MS);
})();
</script>
