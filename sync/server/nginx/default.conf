# nginx site for remarkable.exe.xyz (native nginx on the VM, no docker).
# Installed by sync/deploy/deploy-server.sh to /etc/nginx/sites-available/remarkable
# and symlinked into /etc/nginx/sites-enabled/ (replacing the stock default).
#
# exe.dev terminates TLS and proxies https://remarkable.exe.xyz/ to port 8000
# (the proxy only targets ports 3000-9999, so port 80 is not an option).

server {
    listen 8000 default_server;
    server_name _;
    root /home/exedev/notes;
    index index.html;

    # Behind the exe.dev TLS proxy: keep redirects relative so the
    # internal port (8000) and http scheme never leak into Location headers.
    absolute_redirect off;

    # Site-wide nav: /notes/, /updates/ and /notebook/ are generated by
    # three different things (Shelley, the digest agent, a committed SPA),
    # so the shared nav is injected here into every text/html response
    # rather than maintained in each generator. nav.js prepends the same
    # slim top bar on every page.
    sub_filter '</body>' '<script src="/nav.js" defer></script></body>';
    # Theme bootstrap: resolve the page theme before first paint (no flash).
    # Explicit choice wins (localStorage "rm-theme", set by the nav toggle);
    # otherwise follow the OS (prefers-color-scheme) and keep tracking it
    # live until an explicit choice is made. Exposes window.__rmTheme for
    # nav.js. Effective theme lands on <html data-theme="light|dark">.
    sub_filter '<head>' '<head><script>(function(){var K="rm-theme";function st(){try{var t=localStorage.getItem(K);return(t==="light"||t==="dark")?t:null}catch(e){return null}}function sy(){try{return matchMedia("(prefers-color-scheme: light)").matches?"light":"dark"}catch(e){return"dark"}}function ap(){var t=st()||sy(),d=document.documentElement;d.setAttribute("data-theme",t);d.style.colorScheme=t}ap();try{var mq=matchMedia("(prefers-color-scheme: light)"),fn=function(){if(!st())ap()};mq.addEventListener?mq.addEventListener("change",fn):mq.addListener(fn)}catch(e){}window.__rmTheme={stored:st,sys:sy,apply:ap}})();</script>';
    sub_filter_once on;

    location = /nav.js {
        alias /home/exedev/notes-server/nav.js;
        add_header Cache-Control "no-cache";
    }

    # Shelley's notes are the front page.
    location = / { return 302 /notes/; }

    # ---- Papier (the reMarkable UI viewer + drop-zone) at /papier/ ---------
    location = /papier { return 302 /papier/; }

    # Legacy URL prefix from before the papier rename: old bookmarks land home.
    location = /paper { return 302 /papier/; }
    location /paper/ { rewrite ^/paper/(.*)$ /papier/$1 redirect; }

    location /papier/api/ {
        proxy_pass http://127.0.0.1:8093/;
        proxy_http_version 1.1;
        proxy_request_buffering off;
        client_max_body_size 200m;
        proxy_read_timeout 300s;
    }

    # Versioned covers, pages and ink are immutable; mutable metadata and
    # directory listings below remain no-cache.
    location ~ "^/papier/data/(docs/.+/(?:thumb\.png|pages/[0-9]{4}\.png|ink/(?:pdf|note)-[0-9]{4}\.json))$" {
        alias /home/exedev/remarkable-backup/papier/$1;
        etag on;
        add_header Cache-Control "private, max-age=31536000, immutable" always;
    }

    location ~ "^/papier/inbound/(docs/.+/(?:thumb\.png|pages/[0-9]{4}\.png|ink/(?:pdf|note)-[0-9]{4}\.json))$" {
        alias /home/exedev/remarkable-backup/papier-inbound/$1;
        etag on;
        add_header Cache-Control "private, max-age=31536000, immutable" always;
    }

    location /papier/data/ {
        alias /home/exedev/remarkable-backup/papier/;
        autoindex on;
        autoindex_format json;
        charset utf-8;
        add_header Cache-Control "no-cache";
    }

    location /papier/inbound/ {
        alias /home/exedev/remarkable-backup/papier-inbound/;
        autoindex on;
        autoindex_format json;
        charset utf-8;
        add_header Cache-Control "no-cache";
    }

    location = /papier/upload {
        proxy_pass http://127.0.0.1:8093/upload;
        proxy_http_version 1.1;
        proxy_request_buffering off;
        client_max_body_size 200m;
        proxy_read_timeout 300s;
    }

    # Self-hosted PDF.js viewer app (zoom/search/thumbnails). Opened by the
    # Papier UI as /papier/pdfjs/web/viewer.html?file=<same-origin source-pdf>.
    # The identity sub_filter keeps the site nav out of the viewer chrome.
    location /papier/pdfjs/ {
        alias /home/exedev/notes-server/pdfjs/;
        add_header Cache-Control "public, max-age=604800";
        sub_filter '</body>' '</body>';
    }

    location /papier/ {
        alias /home/exedev/notes-server/papier/;
        index index.html;
        add_header Cache-Control "no-cache";
    }

    location / {
        autoindex on;
        autoindex_exact_size off;
        autoindex_localtime on;
        try_files $uri $uri/ =404;
    }

    # LLM activity digest, written by remarkable-activity-agent.js
    location = /updates { return 302 /updates/; }
    location /updates/ {
        alias /home/exedev/notes/updates/;
        index index.html;
    }

    # notebook app (the "notebook that writes back"): live viewer over the
    # mirror of the tablet's ~/.local/share/notebook/. The JSON autoindex
    # under /notebook/data/ is the viewer's API; no-cache so the SPA's
    # polling sees fresh mtimes right after a sync.
    location = /notebook { return 302 /notebook/; }

    location /notebook/data/ {
        alias /home/exedev/remarkable-backup/notebook-app/;
        autoindex on;
        autoindex_format json;
        charset utf-8;
        add_header Cache-Control "no-cache";
    }

    # one-shot live status (JSON) — the site nav's pulse dot reads this
    location = /notebook/live/health {
        proxy_pass http://127.0.0.1:8091/health;
        add_header Cache-Control "no-cache";
    }

    # live stroke stream (SSE): notebook-live-relay.service on :8091.
    # Buffering must stay off end-to-end or events arrive in clumps.
    location = /notebook/live/events {
        proxy_pass http://127.0.0.1:8091/events;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 24h;
    }

    location /notebook/ {
        alias /home/exedev/notes-server/notebook/;
        index index.html;
        add_header Cache-Control "no-cache";
    }

    # Notebook page viewer
    location = /raw { return 302 /raw/; }

    location /raw/pages/ {
        alias /home/exedev/remarkable-exports/Notebook/pages_jpg/;
        autoindex on;
        autoindex_format json;
    }

    location /raw/ {
        alias /home/exedev/notes-server/raw/;
        index index.html;
    }
}
