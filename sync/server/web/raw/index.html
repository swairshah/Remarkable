<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Notebook</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Google+Sans+Code:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --sidebar-w: 180px;
    --serif:'Iowan Old Style','Palatino Linotype',Palatino,'Book Antiqua',Georgia,serif;
    --mono:'Google Sans Code',ui-monospace,'SF Mono',Menlo,Consolas,monospace;
    --bg:#111; --panel:#181818; --line:#2a2a2a; --text:#eee; --muted:#bbb; --dim:#aaa;
    --hover:#222; --active:#2c3a55; --active-text:#fff;
    --overlay:rgba(0,0,0,.55); --overlay-text:#eee; --thumb-bg:#000;
    --img-shadow:none;
  }
  /* Light mode — nav.js / the <head> bootstrap set <html data-theme="light"> */
  html[data-theme=light] {
    --bg:#f4f3f0; --panel:#ffffff; --line:#e2e0da; --text:#1c1c1c; --muted:#4a4d53; --dim:#6b6f76;
    --hover:#eceae4; --active:#dce6f5; --active-text:#1a2b4a;
    --overlay:rgba(255,255,255,.8); --overlay-text:#1c1c1c; --thumb-bg:#e8e6e0;
    --img-shadow:0 4px 24px rgba(0,0,0,.22);
  }
  html,body{margin:0;height:100%;background:var(--bg);color:var(--text);font-family:var(--serif);overflow:hidden;}
  body{touch-action:pan-y;}

  #sidebar{
    position:fixed;top:0;left:0;bottom:0;width:var(--sidebar-w);
    background:var(--panel);border-right:1px solid var(--line);
    overflow-y:auto;overflow-x:hidden;
    transition:transform .2s ease;z-index:10;
    -webkit-overflow-scrolling:touch;
  }
  body.sb-hidden #sidebar{transform:translateX(calc(-1 * var(--sidebar-w) - 4px));}
  #sidebar ol{list-style:none;margin:0;padding:8px;}
  #sidebar li{
    display:flex;align-items:center;gap:8px;
    padding:6px;margin-bottom:4px;border-radius:6px;
    cursor:pointer;font-size:12px;color:var(--muted);
  }
  #sidebar li:hover{background:var(--hover);}
  #sidebar li.active{background:var(--active);color:var(--active-text);}
  #sidebar li img{
    width:64px;height:84px;object-fit:cover;
    background:var(--thumb-bg);border-radius:3px;flex-shrink:0;
  }
  #sidebar li .num{font-variant-numeric:tabular-nums;font-family:var(--mono);}

  #main{
    position:fixed;top:0;right:0;bottom:0;left:var(--sidebar-w);
    transition:left .2s ease;
  }
  body.sb-hidden #main{left:0;}

  #stage{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;}
  #img{max-width:100%;max-height:100%;user-select:none;-webkit-user-drag:none;display:none;box-shadow:var(--img-shadow);}
  #msg{padding:20px;font-size:14px;color:var(--dim);}

  #counter{
    position:absolute;bottom:12px;left:50%;transform:translateX(-50%);
    background:var(--overlay);color:var(--overlay-text);padding:4px 12px;border-radius:14px;
    font-size:13px;font-variant-numeric:tabular-nums;font-family:var(--mono);
  }

  .nav{position:absolute;top:0;bottom:0;width:35%;cursor:pointer;}
  #prev{left:0;} #next{right:0;}

  #toggle{
    position:fixed;top:10px;left:10px;z-index:20;
    background:var(--overlay);color:var(--overlay-text);border:none;
    width:36px;height:36px;border-radius:8px;cursor:pointer;
    font-size:18px;line-height:1;
  }
  body.sb-hidden #toggle{left:10px;}
  body:not(.sb-hidden) #toggle{left:calc(var(--sidebar-w) + 10px);}

  #latest{
    position:fixed;top:10px;right:10px;z-index:20;
    background:var(--overlay);color:var(--overlay-text);border:none;
    padding:8px 12px;border-radius:8px;cursor:pointer;font-size:12px;
  }

  @media (max-width: 700px) {
    :root { --sidebar-w: 150px; }
    #main{left:0;}
    #sidebar{box-shadow:2px 0 12px rgba(0,0,0,.6);}
    body:not(.sb-hidden) #main{left:0;}
  }
</style>
</head>
<body class="sb-hidden">
<aside id="sidebar"><ol id="list"></ol></aside>
<button id="toggle" title="Toggle sidebar (b)">&#9776;</button>
<button id="latest" title="Jump to latest (End)">Latest</button>
<div id="main">
  <div id="stage">
    <img id="img" alt="">
    <div id="msg">Loading…</div>
  </div>
  <div class="nav" id="prev" title="Previous"></div>
  <div class="nav" id="next" title="Next"></div>
  <div id="counter"></div>
</div>
<script>
const img = document.getElementById('img');
const msg = document.getElementById('msg');
const counter = document.getElementById('counter');
const list = document.getElementById('list');
let pages = [], i = 0;

function show() {
  if (!pages.length) return;
  i = (i + pages.length) % pages.length;
  img.src = 'pages/' + encodeURIComponent(pages[i]);
  img.style.display = 'block';
  msg.style.display = 'none';
  counter.textContent = (i + 1) + ' / ' + pages.length;
  [...list.children].forEach((li, idx) => li.classList.toggle('active', idx === i));
  const active = list.children[i];
  if (active) active.scrollIntoView({ block: 'nearest' });
  [1, -1].forEach(d => {
    const n = (i + d + pages.length) % pages.length;
    new Image().src = 'pages/' + encodeURIComponent(pages[n]);
  });
}

function buildSidebar() {
  list.innerHTML = '';
  pages.forEach((name, idx) => {
    const li = document.createElement('li');
    const thumb = document.createElement('img');
    thumb.loading = 'lazy';
    thumb.src = 'pages/' + encodeURIComponent(name);
    const num = document.createElement('span');
    num.className = 'num';
    num.textContent = String(idx + 1).padStart(3, '0');
    li.appendChild(thumb);
    li.appendChild(num);
    li.onclick = () => { i = idx; show(); };
    list.appendChild(li);
  });
}

fetch('pages/').then(r => r.json()).then(data => {
  pages = data
    .filter(e => e.type === 'file' && /\.(jpe?g|png|gif|webp)$/i.test(e.name))
    .map(e => e.name)
    .sort();
  if (!pages.length) { msg.textContent = 'No images found.'; return; }
  buildSidebar();
  i = pages.length - 1;
  show();
}).catch(e => { msg.textContent = 'Failed to load list: ' + e; });

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === ' ' || e.key === 'PageDown') { i++; show(); }
  else if (e.key === 'ArrowLeft' || e.key === 'PageUp') { i--; show(); }
  else if (e.key === 'End') { i = pages.length - 1; show(); }
  else if (e.key === 'Home') { i = 0; show(); }
  else if (e.key === 'b' || e.key === 'B') { document.body.classList.toggle('sb-hidden'); }
});
document.getElementById('prev').onclick = () => { i--; show(); };
document.getElementById('next').onclick = () => { i++; show(); };
document.getElementById('toggle').onclick = () => document.body.classList.toggle('sb-hidden');
document.getElementById('latest').onclick = () => { i = pages.length - 1; show(); };

let sx = 0, sy = 0, st = 0;
document.addEventListener('touchstart', e => {
  sx = e.touches[0].clientX; sy = e.touches[0].clientY; st = Date.now();
}, { passive: true });
document.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - sx;
  const dy = e.changedTouches[0].clientY - sy;
  if (Date.now() - st < 600 && Math.abs(dx) > 40 && Math.abs(dx) > Math.abs(dy)) {
    if (dx < 0) i++; else i--;
    show();
  }
}, { passive: true });
</script>
</body>
</html>
