# nginx site for remarkable.exe.xyz (native nginx on the VM, no docker).
# exe.dev terminates TLS and proxies https://remarkable.exe.xyz/ to :8000.
#
# alt-ui takes over the ROOT; every existing notebook/updates/raw block is
# preserved unchanged. Installed by alt-ui/sync/deploy/deploy-server.sh
# (which backs up the previous /etc/nginx/sites-available/remarkable first).

server {
    listen 8000 default_server;
    server_name _;
    root /home/exedev/notes;
    index index.html;
    absolute_redirect off;

    # ---- alt-ui (the front page) ----------------------------------------
    # The unified reMarkable UI viewer + drop-zone. The JSON autoindex under
    # /alt-ui/data/ is the viewer's read API (mirror of the tablet's
    # ~/.local/share/alt-ui/); no-cache so polling sees fresh mtimes.
    location = / {
        alias /home/exedev/notes-server/alt-ui/;
        try_files /index.html =404;
        add_header Cache-Control "no-cache";
    }

    location /alt-ui/data/ {
        alias /home/exedev/remarkable-backup/alt-ui/;
        autoindex on;
        autoindex_format json;
        charset utf-8;
        add_header Cache-Control "no-cache";
    }

    # inbound (web-dropped) docs, waiting to be pulled to the tablet. Served
    # read-only so the viewer can show them tagged "pending sync".
    location /alt-ui/inbound/ {
        alias /home/exedev/remarkable-backup/alt-ui-inbound/;
        autoindex on;
        autoindex_format json;
        charset utf-8;
        add_header Cache-Control "no-cache";
    }

    # inbound drop: POST a file -> alt-ui-upload.service on :8093 renders /
    # unpacks it into the inbound dir for the tablet to pull. (S2)
    location = /alt-ui/upload {
        proxy_pass http://127.0.0.1:8093/upload;
        proxy_http_version 1.1;
        proxy_request_buffering off;
        client_max_body_size 200m;
        proxy_read_timeout 300s;
    }

    location /alt-ui/ {
        alias /home/exedev/notes-server/alt-ui/;
        index index.html;
        add_header Cache-Control "no-cache";
    }

    # ---- everything below is the pre-existing notebook site, unchanged ----

    location / {
        autoindex on;
        autoindex_exact_size off;
        autoindex_localtime on;
        try_files $uri $uri/ =404;
    }

    location = /updates { return 302 /updates/; }
    location /updates/ {
        alias /home/exedev/notes/updates/;
        index index.html;
    }

    location = /notebook { return 302 /notebook/; }

    location /notebook/data/ {
        alias /home/exedev/remarkable-backup/notebook-app/;
        autoindex on;
        autoindex_format json;
        charset utf-8;
        add_header Cache-Control "no-cache";
    }

    location = /notebook/live/events {
        proxy_pass http://127.0.0.1:8091/events;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 24h;
    }

    location /notebook/ {
        alias /home/exedev/notes-server/notebook/;
        index index.html;
        add_header Cache-Control "no-cache";
    }

    location = /raw { return 302 /raw/; }

    location /raw/pages/ {
        alias /home/exedev/remarkable-exports/Notebook/pages_jpg/;
        autoindex on;
        autoindex_format json;
    }

    location /raw/ {
        alias /home/exedev/notes-server/raw/;
        index index.html;
    }
}
